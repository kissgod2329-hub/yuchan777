<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추첨기</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <!-- Kakao SDK -->
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js" integrity="sha384-l68v7I+v6E7r6tI+4v6q6+8h/K45l4nF6+oX4Y8k/o4=" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <div class="user-menu" id="userMenu">
            <button id="loginBtn" class="login-btn">로그인</button>
            <div id="userInfo" class="user-info" style="display: none;">
                <img id="userAvatar" src="" alt="Avatar">
                <span id="userName"></span>
                <button id="logoutBtn" class="logout-link">로그아웃</button>
            </div>
        </div>
    </header>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>로그인</h2>
            <p>소셜 계정으로 로그인하고 번호를 저장해보세요!</p>
            <div class="social-login-buttons">
                <button id="googleLogin" class="social-btn google">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                    Google로 로그인
                </button>
                <button id="kakaoLogin" class="social-btn kakao">
                    <img src="https://developers.kakao.com/assets/img/lib/logos/kakaotalksharing/kakaotalk_sharing_btn_small.png" alt="Kakao">
                    카카오톡으로 로그인
                </button>
            </div>
        </div>
    </div>

    <div class="container">
        <h1>로또 번호 추첨기</h1>
        <div class="lotto-results" id="lottoContainer">
            <!-- 5 sets of lotto numbers will be displayed here -->
            <div class="lotto-row">- - - - - -</div>
            <div class="lotto-row">- - - - - -</div>
            <div class="lotto-row">- - - - - -</div>
            <div class="lotto-row">- - - - - -</div>
            <div class="lotto-row">- - - - - -</div>
        </div>
        <button id="drawButton">추첨하기</button>
    </div>
    <script src="main.js"></script>
</body>
</html>
